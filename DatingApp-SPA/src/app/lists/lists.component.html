<div class="text-center mt-3">
  <h2>{{lubieParametry === 'Lubisz' ? 'Użytkownicy którzy mnie lubią' : 'Użytkownicy których lubię'}} : {{paginacja.caloscItems}}</h2>
</div>

<div class="container mt-3">

<div class="row">
  <div class="btn-group">
    <button class="btn btn-primary" [(ngModel)]="lubieParametry" btnRadio="Lubisz" (click)="loadUsers()">Użytkownicy którzy mnie lubią</button>
    <button class="btn btn-primary" [(ngModel)]="lubieParametry" btnRadio="Lubic" (click)="loadUsers()">Użytkownicy których lubię</button>
  </div>
</div>

<br>

<div class="row">
  <div *ngFor="let user of users" class="col-sm-6 col-md-4 col-lg-4 col-xl-2">
    <app-member-card [user]="user"></app-member-card>
  </div>
</div>



</div>

<div class="d-flex justify-content-center">
<pagination [boundaryLinks]="true" [totalItems]="paginacja.caloscItems" [itemsPerPage]="paginacja.itemsNaStrone" [(ngModel)]="paginacja.domyslnaStrona"
  (pageChanged)="pageChanged($event)" previousText="&lsaquo;" nextText="&rsaquo;" firstText="&laquo;" lastText="&raquo;">

</pagination>
</div>
