<form #registerForm="ngForm" (ngSubmit)="rejestruj()">
  <h2 class="text-center text-primary">Zarejestruj</h2>
  <hr>

  <div class="form-group">
    <input type="text" class="form-control" required name="username" [(ngModel)]="model.username" placeholder="Nazwa uzytkownika">
  </div>

  <div class="form-group">
    <input type="password" class="form-control" required name="password" [(ngModel)]="model.password" placeholder="Haslo">
  </div>

  <div class="form-group text-center">
    <button class="btn btn-success" type="submit">Rejestruj</button>
    <button class="btn btn-default" type="button" (click)="anuluj()">Anuluj</button>
  </div>
  
</form>
